name: "Basic Test Suite"
provider:
  type: anthropic
  model: claude-3-haiku-20240307
  apiKeyEnv: ANTHROPIC_API_KEY

tests:
  - name: "Contains fox"
    prompt: "Tell me about a fox"
    assert:
      - type: contains
        value: "fox"
  - name: "Contains dog"
    prompt: "Tell me about a fox"
    assert:
      - type: contains
        value: "dog"
